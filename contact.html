<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تواصل | بودكاست ركز وياي</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background-color: #f9f9f9;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #222;
      color: #fff;
      padding: 20px;
    }
    nav {
      margin: 20px 0;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
    .contact-links a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background-color: #0066cc;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }
    .contact-links a:hover {
      background-color: #004999;
    }
    form {
      margin: 20px auto;
      max-width: 400px;
      text-align: left;
    }
    form input, form textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    form button {
      width: 100%;
      padding: 12px;
      background-color: #0066cc;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    form button:hover {
      background-color: #004999;
    }
    .success-message {
      display: none;
      margin-top: 15px;
      color: green;
      font-weight: bold;
    }
    .error-message {
      display: none;
      margin-top: 15px;
      color: red;
      font-weight: bold;
    }
    footer {
      background-color: #222;
      color: #fff;
      padding: 10px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📩 تواصل معنا</h1>
    <p>طرق التواصل مع بودكاست ركز وياي</p>
  </header>

  <!-- روابط التواصل -->
  <div class="contact-links">
    <a href="https://www.instagram.com/rakizwayay?igsh=MTBpZmlxMDh3YWRxNA%3D%3D&utm_source=qr" target="_blank">📷 تابعنا على إنستغرام</a>
    <a href="https://www.facebook.com/share/1BKhv7kbk5/?mibextid=wwXIfr" target="_blank">📘 تابعنا على فيسبوك</a>
  </div>

  <!-- فورم التواصل -->
  <form id="contactForm" action="https://formspree.io/f/mzdwzbab" method="POST">
    <label>الاسم:</label>
    <input type="text" name="name" placeholder="اكتب اسمك هنا" required>

    <label>البريد الإلكتروني:</label>
    <input type="email" name="email" placeholder="اكتب بريدك هنا" required>

    <label>رسالتك:</label>
    <textarea name="message" rows="5" placeholder="اكتب رسالتك هنا" required></textarea>

    <button type="submit">📨 إرسال الرسالة</button>
  </form>

  <!-- رسائل -->
  <div id="successMessage" class="success-message">
    ✅ تم إرسال الرسالة بنجاح، انتظر الرد على الإيميل
  </div>
  <div id="errorMessage" class="error-message">
    ⚠️ حدث خطأ أثناء الإرسال، حاول مرة أخرى
  </div>

  <!-- روابط التنقل -->
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">شتريد تعرف عن ركز وياي</a>
    <a href="episodes.html">جميع الحلقات</a>
    <a href="shorts.html">مقاطع البودكاست القصيرة</a>
    <a href="contact.html">تواصل</a>
  </nav>

  <footer>
    <p>© 2026 بودكاست ركز وياي | إبراهيم أبو الليش</p>
  </footer>

  <!-- Script لعرض رسائل النجاح والخطأ -->
  <script>
    const form = document.getElementById('contactForm');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const response = await fetch(form.action, {
        method: form.method,
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      });
      if (response.ok) {
        form.reset();
        successMessage.style.display = 'block';
        errorMessage.style.display = 'none';
      } else {
        successMessage.style.display = 'none';
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
