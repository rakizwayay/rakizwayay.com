<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مقاطع البودكاست القصيرة | بودكاست ركز وياي</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background-color: #f9f9f9;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #222;
      color: #fff;
      padding: 20px;
    }
    iframe {
      width: 80%;
      height: 450px;
      border: none;
      border-radius: 10px;
      margin: 20px auto;
    }
    .controls button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #0066cc;
      color: #fff;
      cursor: pointer;
    }
    .controls button:hover {
      background-color: #004999;
    }
    nav {
      margin: 20px 0;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
    footer {
      background-color: #222;
      color: #fff;
      padding: 10px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎬 مقاطع البودكاست القصيرة</h1>
    <p>شاهد واستمع إلى المقاطع السريعة من بودكاست ركز وياي مباشرة هنا</p>
  </header>

  <!-- مشغل قائمة التشغيل -->
  <div id="player"></div>

  <!-- أزرار التحكم -->
  <div class="controls">
    <button onclick="prevVideo()">⏮️ الفيديو السابق</button>
    <button onclick="rewind()">⏪ ترجيع 10 ثواني</button>
    <button onclick="forward()">⏩ تقديم 10 ثواني</button>
    <button onclick="togglePlay()">⏯️ تشغيل/إيقاف مؤقت</button>
  </div>

  <!-- روابط التنقل -->
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">شتريد تعرف عن ركز وياي</a>
    <a href="contact.html">تواصل</a>
    <a href="episodes.html">جميع الحلقات</a>
    <a href="shorts.html">مقاطع البودكاست القصيرة</a>
  </nav>

  <footer>
    <p>© 2026 بودكاست ركز وياي | إبراهيم أبو الليش</p>
  </footer>

  <!-- YouTube API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '450',
        width: '80%',
        playerVars: {
          listType: 'playlist',
          list: 'PLRMU50WYjkBpf_sc5sjyxZQZLY5LwOW5k'
        }
      });
    }
    function prevVideo() {
      player.previousVideo();
    }
    function rewind() {
      var currentTime = player.getCurrentTime();
      player.seekTo(currentTime - 10, true);
    }
    function forward() {
      var currentTime = player.getCurrentTime();
      player.seekTo(currentTime + 10, true);
    }
    function togglePlay() {
      if (player.getPlayerState() == YT.PlayerState.PLAYING) {
        player.pauseVideo();
      } else {
        player.playVideo();
      }
    }
  </script>
</body>
</html>
